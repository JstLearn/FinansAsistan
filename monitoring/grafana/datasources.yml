# ════════════════════════════════════════════════════════════
# Grafana Data Sources Configuration
# ════════════════════════════════════════════════════════════

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
      # Docker Compose network name
      # For Kubernetes: http://prometheus.monitoring.svc.cluster.local:9090

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
      # Docker Compose network name
      # For Kubernetes: http://loki.monitoring.svc.cluster.local:3100

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: FinansAsistan
    user: finans
    secureJsonData:
      password: ${DB_PASSWORD}
    jsonData:
      sslmode: 'disable'
      postgresVersion: 1600
      timescaledb: false

