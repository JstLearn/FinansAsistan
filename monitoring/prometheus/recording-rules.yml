# ════════════════════════════════════════════════════════════
# Prometheus Recording Rules
# Pre-computed metrics for better performance
# ════════════════════════════════════════════════════════════

groups:
  - name: backend_recording_rules
    interval: 30s
    rules:
      # Request rate by status code
      - record: http:requests:rate5m
        expr: rate(http_requests_total[5m])

      # Request rate by endpoint
      - record: http:requests:by_endpoint:rate5m
        expr: sum(rate(http_requests_total[5m])) by (endpoint, method)

      # Error rate
      - record: http:errors:rate5m
        expr: rate(http_requests_total{status=~"5.."}[5m])

      # Response time percentiles
      - record: http:response_time:p95
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))

      - record: http:response_time:p99
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))

      # Average response time
      - record: http:response_time:avg
        expr: rate(http_request_duration_seconds_sum[5m]) / rate(http_request_duration_seconds_count[5m])

  - name: database_recording_rules
    interval: 30s
    rules:
      # Database connection pool usage
      - record: db:connections:usage
        expr: pg_stat_database_numbackends / pg_settings_max_connections

      # Database size
      - record: db:size:bytes
        expr: pg_database_size_bytes

      # Query performance
      - record: db:queries:avg_time
        expr: rate(pg_stat_statements_mean_exec_time[5m])

  - name: redis_recording_rules
    interval: 30s
    rules:
      # Cache hit rate
      - record: redis:cache:hit_rate
        expr: rate(redis_keyspace_hits_total[5m]) / (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m]))

      # Memory usage percentage
      - record: redis:memory:usage_percent
        expr: (redis_memory_used_bytes / redis_memory_max_bytes) * 100

  - name: kafka_recording_rules
    interval: 30s
    rules:
      # Message rate
      - record: kafka:messages:rate5m
        expr: rate(kafka_server_brokertopicmetrics_messagesin_total[5m])

      # Consumer lag
      - record: kafka:consumer:lag
        expr: kafka_consumer_lag_sum

      # Partition count
      - record: kafka:partitions:count
        expr: count(kafka_partition_info) by (topic)

