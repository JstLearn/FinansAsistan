server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Disable server tokens (güvenlik: Nginx versiyon bilgisini gizler)
    # Bu direktif, HTTP response header'larında ve hata sayfalarında
    # Nginx versiyon bilgisinin gösterilmesini engeller.
    # Saldırganlar versiyon bilgisini kullanarak o versiyona özel
    # güvenlik açıklarını hedefleyebilirler.
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Health check endpoint (en önce, en spesifik)
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # favicon - cache'lenmemeli, güncellenebilir
    location = /favicon.png {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # fluid-sim.js - hash yok, her deploy değişebilir, cache'lenmemeli
    location = /fluid-sim.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Static assets caching (spesifik dosya uzantıları için)
    # Bu location regex ile eşleştiğinde try_files çalışmaz, direkt dosyayı döndürür
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map|LICENSE\.txt)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API Proxy - Backend'e yönlendir (Kubernetes/Docker Compose)
    # Backend service name: 'backend' (k8s service veya docker compose service)
    location /api/ {
        # Kubernetes'te backend service'e, Docker Compose'da backend container'a proxy
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # React Router (SPA) support - tüm route'ları index.html'e yönlendir
    # Bu location en son gelmeli, çünkü catch-all görevi görüyor
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 404 error handling - eğer index.html yoksa bile bir şey döndür
    error_page 404 /index.html;
}

