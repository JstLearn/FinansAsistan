# ════════════════════════════════════════════════════════════
# FinansAsistan - PostgreSQL Configuration
# WAL Archiving için gerekli ayarlar
# ════════════════════════════════════════════════════════════

# WAL Level - replica veya logical (replica yeterli)
wal_level = replica

# Archive Mode - WAL archiving'i aktif et
archive_mode = on

# Archive Command - WAL dosyalarını S3'e yükle
# Bu komut PostgreSQL tarafından her WAL segment'i için çalıştırılır
archive_command = '/scripts/archive-wal.sh %p'

# Archive Timeout - WAL segment'i belirli süre sonra archive et (saniye)
# 0 = sadece segment dolduğunda archive et
archive_timeout = 300

# Max WAL Size - WAL segment'lerinin maksimum boyutu
max_wal_size = 1GB

# Min WAL Size - WAL segment'lerinin minimum boyutu
min_wal_size = 80MB

# Checkpoint Timeout - Checkpoint'ler arası maksimum süre (saniye)
checkpoint_timeout = 5min

# Checkpoint Completion Target - Checkpoint'in ne kadar hızlı tamamlanması gerektiği
checkpoint_completion_target = 0.9

# Logging
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB

# Connection Settings
max_connections = 100
shared_buffers = 256MB
effective_cache_size = 1GB

# Performance
random_page_cost = 1.1
effective_io_concurrency = 200

