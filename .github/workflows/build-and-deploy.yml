name: Build and Deploy Images

on:
  push:
    branches:
      - master  # Master branch trigger
    paths:
      - 'back/**'
      - 'front/**'
      - 'services/**'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:  # Allow manual trigger
    inputs:
      force_rebuild:
        description: 'Force rebuild all images'
        required: false
        default: 'false'

env:
  AWS_REGION: eu-central-1
  ECR_REGISTRY: 654654337554.dkr.ecr.eu-central-1.amazonaws.com

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.changes.outputs.backend }}
      frontend_changed: ${{ steps.changes.outputs.frontend }}
      event_processor_changed: ${{ steps.changes.outputs.event_processor }}
      any_changed: ${{ steps.changes.outputs.backend == 'true' || steps.changes.outputs.frontend == 'true' || steps.changes.outputs.event_processor == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "event_processor=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Get changed files
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Check backend changes
          if echo "$CHANGED_FILES" | grep -qE '^back/'; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "Backend changed"
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi
          
          # Check frontend changes
          if echo "$CHANGED_FILES" | grep -qE '^front/'; then
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "Frontend changed"
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi
          
          # Check event processor changes
          if echo "$CHANGED_FILES" | grep -qE '^services/event-processor/'; then
            echo "event_processor=true" >> $GITHUB_OUTPUT
            echo "Event processor changed"
          else
            echo "event_processor=false" >> $GITHUB_OUTPUT
          fi

  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend_changed == 'true'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata for backend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/finans-backend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./back
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image info
        run: |
          echo "Backend image built and pushed:"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Version: ${{ steps.meta.outputs.version }}"

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_changed == 'true'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata for frontend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/finans-frontend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./front
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image info
        run: |
          echo "Frontend image built and pushed:"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Version: ${{ steps.meta.outputs.version }}"

  build-event-processor:
    name: Build Event Processor Image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.event_processor_changed == 'true'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata for event processor
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/finans-event-processor
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push event processor image
        uses: docker/build-push-action@v5
        with:
          context: ./services/event-processor
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image info
        run: |
          echo "Event Processor image built and pushed:"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Version: ${{ steps.meta.outputs.version }}"

  deploy-to-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [detect-changes, build-backend, build-frontend, build-event-processor]
    if: |
      always() && 
      needs.detect-changes.outputs.any_changed == 'true' &&
      !contains(needs.*.result, 'failure')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload deployment trigger to S3
        run: |
          # Create deployment info
          DEPLOY_INFO=$(cat <<EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "backend_changed": ${{ needs.detect-changes.outputs.backend_changed }},
            "frontend_changed": ${{ needs.detect-changes.outputs.frontend_changed }},
            "event_processor_changed": ${{ needs.detect-changes.outputs.event_processor_changed }},
            "backend_tag": "${{ needs.build-backend.outputs.image_tag }}",
            "frontend_tag": "${{ needs.build-frontend.outputs.image_tag }}",
            "event_processor_tag": "${{ needs.build-event-processor.outputs.image_tag }}"
          }
          EOF
          )
          
          echo "$DEPLOY_INFO" > /tmp/deploy-trigger.json
          cat /tmp/deploy-trigger.json
          
          # Upload to S3 trigger file
          aws s3 cp /tmp/deploy-trigger.json s3://jstlearn-finans-backup/deploy-triggers/latest.json
          aws s3 cp /tmp/deploy-trigger.json "s3://jstlearn-finans-backup/deploy-triggers/$(date -u +%Y%m%d-%H%M%S).json"
          
          echo "Deployment trigger uploaded to S3"

      - name: Notify deployment status
        if: always()
        run: |
          echo "=== Deployment Summary ==="
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Backend changed: ${{ needs.detect-changes.outputs.backend_changed }}"
          echo "Frontend changed: ${{ needs.detect-changes.outputs.frontend_changed }}"
          echo "Event Processor changed: ${{ needs.detect-changes.outputs.event_processor_changed }}"
          echo "Status: ${{ job.status }}"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: |
      always() &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Trivy
        run: |
          sudo apt-get install wget apt-transport-https gnupg lsb-release -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y

      - name: Scan backend image
        if: needs.build-backend.result == 'success'
        run: |
          trivy image \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --format table \
            ${{ env.ECR_REGISTRY }}/finans-backend:latest
        continue-on-error: true

      - name: Scan frontend image
        if: needs.build-frontend.result == 'success'
        run: |
          trivy image \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --format table \
            ${{ env.ECR_REGISTRY }}/finans-frontend:latest
        continue-on-error: true

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [deploy-to-k8s]
    if: always()
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.deploy-to-k8s.result }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
