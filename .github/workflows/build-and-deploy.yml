          fi
      
      - name: Create/Update Cloudflare DNS API token secret
        if: steps.login-ecr.outcome == 'success' && env.CLOUDFLARE_API != ''
        run: |
          # Clean token (strip newlines/whitespace)
          CF_API_TOKEN=$(echo -n "${CLOUDFLARE_API}" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          kubectl create secret generic cloudflare-api-token \
            --namespace=traefik-system \
            --from-literal=CF_API_TOKEN="${CF_API_TOKEN}" \
            --from-literal=CF_DNS_API_TOKEN="${CF_API_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ Kubernetes secret 'cloudflare-api-token' created/updated in traefik-system"
          echo "   (Secret is NOT written to disk or committed to Git)"

      - name: Create External-DNS AWS credentials secret
        if: steps.login-ecr.outcome == 'success'
        run: |
          echo "Creating External-DNS AWS credentials secret directly in cluster (not in Git)..."
          
          # Get AWS credentials from GitHub Secrets
          AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          
          # Clean credentials: remove newlines and trim whitespace
          AWS_ACCESS_KEY_ID=$(echo -n "$AWS_ACCESS_KEY_ID" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          AWS_SECRET_ACCESS_KEY=$(echo -n "$AWS_SECRET_ACCESS_KEY" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          
          # Create External-DNS secret directly in cluster (no files, no Git)
          kubectl create secret generic external-dns-aws-credentials \
            --namespace=kube-system \
            --from-literal=AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID}" \
            --from-literal=AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY}" \
            --dry-run=client -o yaml | kubectl apply -f -
          
          echo "✅ External-DNS AWS credentials secret created/updated in cluster"
          echo "   (Secret is NOT written to disk or committed to Git)"
      
      - name: Commit and push updated k8s manifests to GitHub
        if: steps.login-ecr.outcome == 'success'
        env:
          BACKEND_CHANGED: ${{ steps.detect-all-changes.outputs.backend_changed }}
          FRONTEND_CHANGED: ${{ steps.detect-all-changes.outputs.frontend_changed }}
          EVENT_PROCESSOR_CHANGED: ${{ steps.detect-all-changes.outputs.event_processor_changed }}
          POSTGRES_CHANGED: ${{ steps.detect-all-changes.outputs.postgres_changed }}
          REDIS_CHANGED: ${{ steps.detect-all-changes.outputs.redis_changed }}
          KAFKA_CHANGED: ${{ steps.detect-all-changes.outputs.kafka_changed }}
          MONITORING_CHANGED: ${{ steps.detect-all-changes.outputs.monitoring_changed }}
          ARGOCD_CHANGED: ${{ steps.detect-all-changes.outputs.argocd_changed }}
          K8S_FILES_CHANGED: ${{ steps.detect-all-changes.outputs.k8s_files_changed }}
          FRONTEND_DIGEST_OUTPUT: ${{ steps.frontend-digest.outputs.frontend_digest }}
          BACKEND_DIGEST_OUTPUT: ${{ steps.backend-digest.outputs.backend_digest }}
          EVENT_PROCESSOR_DIGEST_OUTPUT: ${{ steps.event-processor-digest.outputs.event_processor_digest }}
          BUILD_FRONTEND_OUTCOME: ${{ steps.build-frontend.outcome }}
          BUILD_BACKEND_OUTCOME: ${{ steps.build-backend.outcome }}
          BUILD_EVENT_PROCESSOR_OUTCOME: ${{ steps.build-event-processor.outcome }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # Configure git
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Set up remote URL with token for authentication
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git
          
          # Fetch latest changes from remote to avoid push conflicts
          echo "🔄 Fetching latest changes from remote..."
          git fetch origin ${GITHUB_REF_NAME} || echo "⚠️  Fetch failed, continuing anyway..."
          
          # Try to merge remote changes if any exist
          if git merge-base --is-ancestor HEAD origin/${GITHUB_REF_NAME} 2>/dev/null; then
            echo "✅ Local branch is up to date with remote"
          else
            echo "⚠️  Remote has new commits, attempting to merge..."
            git merge origin/${GITHUB_REF_NAME} --no-edit || {
              echo "⚠️  Merge conflict detected, but continuing with commit..."
              echo "   Conflicts will be resolved by keeping local changes (k8s manifests)"
            }
          fi
          
          # Get commit SHA
          COMMIT_SHA="${GITHUB_SHA}"
          
          # Only add deployment files for services that actually changed OR were built successfully
          # Backend/Frontend/Event-processor build başarılı olduğunda deployment dosyası güncellenir, bu yüzden commit'e eklenmelidir
          DEPLOYMENT_FILES=""
          # Backend: Add if changed OR if build was successful (new image was pushed)
          if [ "$BACKEND_CHANGED" = "true" ] || [ -n "$BACKEND_DIGEST_OUTPUT" ] || [ "$BUILD_BACKEND_OUTCOME" = "success" ] || [ "$BUILD_BACKEND_OUTCOME" = "skipped" ]; then
            DEPLOYMENT_FILES="${DEPLOYMENT_FILES} k8s/04-backend-deployment.yaml"
            echo "✅ Backend deployment file will be committed (build successful or code changed)"
          fi
          # Frontend: Add if changed OR if build was successful (new image was pushed)
          # CRITICAL: Always add frontend deployment if build succeeded, even if FRONTEND_CHANGED is false
          # This ensures deployment file is committed and ArgoCD will sync
          if [ "$FRONTEND_CHANGED" = "true" ] || [ -n "$FRONTEND_DIGEST_OUTPUT" ] || [ "$BUILD_FRONTEND_OUTCOME" = "success" ] || [ "$BUILD_FRONTEND_OUTCOME" = "skipped" ]; then
            DEPLOYMENT_FILES="${DEPLOYMENT_FILES} k8s/05-frontend-deployment.yaml"
            echo "✅ Frontend deployment file will be committed (build successful or code changed)"
          fi
          # Event-processor: Add if changed OR if build was successful (new image was pushed)
          if [ "$EVENT_PROCESSOR_CHANGED" = "true" ] || [ -n "$EVENT_PROCESSOR_DIGEST_OUTPUT" ] || [ "$BUILD_EVENT_PROCESSOR_OUTCOME" = "success" ] || [ "$BUILD_EVENT_PROCESSOR_OUTCOME" = "skipped" ]; then
            DEPLOYMENT_FILES="${DEPLOYMENT_FILES} k8s/11-event-processor.yaml"
            echo "✅ Event-processor deployment file will be committed (build successful or code changed)"
          fi
          
          # Secrets files are created for ArgoCD sync and committed to Git
          # Secrets sadece 3 yerde bulunur (original source):
          # 1. Lokalde QUICK_START/.env
          # 2. AWS S3'te QUICK_START/.env
          # 3. GitHub Secrets
          # Secret files (01-secrets.yaml, 01a-ecr-registry-secret.yaml, 15a-external-dns-secret.yaml)
          # are created from GitHub Secrets and committed to Git for ArgoCD sync
          # Always add secrets files if they exist (created in previous steps)
          if [ -f "k8s/01a-ecr-registry-secret.yaml" ]; then
            DEPLOYMENT_FILES="${DEPLOYMENT_FILES} k8s/01a-ecr-registry-secret.yaml"
            echo "✅ ECR registry secret file will be committed (for ArgoCD sync)"
          fi
          if [ -f "k8s/01-secrets.yaml" ]; then
            DEPLOYMENT_FILES="${DEPLOYMENT_FILES} k8s/01-secrets.yaml"
            echo "✅ App secrets file will be committed (for ArgoCD sync)"
          fi
          if [ -f "k8s/15a-external-dns-secret.yaml" ]; then
            DEPLOYMENT_FILES="${DEPLOYMENT_FILES} k8s/15a-external-dns-secret.yaml"
            echo "✅ External-DNS secret file will be committed (for ArgoCD sync)"
          fi
          
          # PostgreSQL: Add if changed OR if files were updated
          if [ "$POSTGRES_CHANGED" = "true" ] || git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -qE "^k8s/01-postgres"; then
            DEPLOYMENT_FILES="${DEPLOYMENT_FILES} k8s/01-postgres-statefulset.yaml"
            echo "✅ PostgreSQL StatefulSet file will be committed"
          fi
          # Redis: Add if changed OR if files were updated
          if [ "$REDIS_CHANGED" = "true" ] || git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -qE "^k8s/10-redis"; then
            DEPLOYMENT_FILES="${DEPLOYMENT_FILES} k8s/10-redis.yaml"
            echo "✅ Redis deployment file will be committed"
          fi
          # Kafka: Add if changed OR if files were updated
          if [ "$KAFKA_CHANGED" = "true" ] || git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -qE "^k8s/02-kafka|^k8s/03-kafka"; then
            DEPLOYMENT_FILES="${DEPLOYMENT_FILES} k8s/02-kafka-cluster.yaml k8s/02a-kafka-nodepools.yaml k8s/03-kafka-topics.yaml"
            echo "✅ Kafka config files will be committed"
          fi
          # Monitoring: Add if changed OR if files were updated
          if [ "$MONITORING_CHANGED" = "true" ] || git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -qE "^k8s/09-monitoring"; then
            DEPLOYMENT_FILES="${DEPLOYMENT_FILES} k8s/09-monitoring.yaml"
            echo "✅ Monitoring deployment file will be committed"
          fi
          
          # ArgoCD application dosyası sadece gerçekten değiştiğinde commit edilmeli
          # Otomatik sync zaten aktif, manuel refresh'e gerek yok
          # ArgoCD is excluded from automatic updates per user request
          
          # Add all changed files from the update step (deployments, configs, etc.)
          if [ -n "${{ steps.update-images.outputs.changed_files }}" ]; then
            ADDITIONAL_FILES="${{ steps.update-images.outputs.changed_files }}"
            for file in $ADDITIONAL_FILES; do
              DEPLOYMENT_FILES="${DEPLOYMENT_FILES} ${file}"
            done
          fi
          
          echo "Files to commit: ${DEPLOYMENT_FILES}"
          for file in $DEPLOYMENT_FILES; do
            if [ -f "$file" ]; then
              git add "$file"
              echo "✅ Added $file to commit"
            else
              echo "⚠️  File not found: $file"
            fi
          done
          
          # Commit deployment files only if there are changes
          # Check if there are staged changes
          if git diff --cached --quiet; then
            if [ -n "$DEPLOYMENT_FILES" ]; then
              echo "⚠️  No staged changes, but deployment files should be updated..."
              # Force add deployment files for changed services
              for file in $DEPLOYMENT_FILES; do
                if [ -f "$file" ]; then
                  git add -f "$file"
                fi
              done
            else
              echo "ℹ️  No deployment files to commit (no services changed)"
            fi
          fi
          
          # Commit only if there are changes (deployment files for changed services)
          if ! git diff --cached --quiet; then
            # Build descriptive commit message
            COMMIT_MSG="chore: trigger pod restart to pull latest images [${COMMIT_SHA:0:7}]"
            
            # Add service names to commit message (changed services OR built successfully)
            UPDATED_SERVICES=""
            # Backend: Include if changed OR if deployment file was updated (build successful)
            if [ "$BACKEND_CHANGED" = "true" ] || echo "$DEPLOYMENT_FILES" | grep -q "k8s/04-backend-deployment.yaml" || [ "$BUILD_BACKEND_OUTCOME" = "success" ]; then
              UPDATED_SERVICES="${UPDATED_SERVICES} backend"
            fi
            # Frontend: Include if changed OR if deployment file was updated (build successful)
            # CRITICAL: Always include frontend if build succeeded, ensuring deployment is updated
            if [ "$FRONTEND_CHANGED" = "true" ] || echo "$DEPLOYMENT_FILES" | grep -q "k8s/05-frontend-deployment.yaml" || [ "$BUILD_FRONTEND_OUTCOME" = "success" ]; then
              UPDATED_SERVICES="${UPDATED_SERVICES} frontend"
            fi
            # Event-processor: Include if changed OR if deployment file was updated (build successful)
            if [ "$EVENT_PROCESSOR_CHANGED" = "true" ] || echo "$DEPLOYMENT_FILES" | grep -q "k8s/11-event-processor.yaml" || [ "$BUILD_EVENT_PROCESSOR_OUTCOME" = "success" ]; then
              UPDATED_SERVICES="${UPDATED_SERVICES} event-processor"
            fi
            
            # Add other services that changed
            # PostgreSQL: Include if changed OR if deployment file was updated
            if [ "$POSTGRES_CHANGED" = "true" ] || echo "$DEPLOYMENT_FILES" | grep -q "k8s/01-postgres-statefulset.yaml"; then
              UPDATED_SERVICES="${UPDATED_SERVICES} postgres"
            fi
            # Redis: Include if changed OR if deployment file was updated
            if [ "$REDIS_CHANGED" = "true" ] || echo "$DEPLOYMENT_FILES" | grep -q "k8s/10-redis.yaml"; then
              UPDATED_SERVICES="${UPDATED_SERVICES} redis"
            fi
            # Kafka: Include if changed OR if deployment file was updated
            if [ "$KAFKA_CHANGED" = "true" ] || echo "$DEPLOYMENT_FILES" | grep -q "k8s/02-kafka"; then
              UPDATED_SERVICES="${UPDATED_SERVICES} kafka"
            fi
            # Monitoring: Include if changed OR if deployment file was updated
            if [ "$MONITORING_CHANGED" = "true" ] || echo "$DEPLOYMENT_FILES" | grep -q "k8s/09-monitoring.yaml"; then
              UPDATED_SERVICES="${UPDATED_SERVICES} monitoring"
            fi
            # ArgoCD: Skip (user requested to exclude ArgoCD from automatic updates)
            # if [ "$ARGOCD_CHANGED" = "true" ]; then
            #   UPDATED_SERVICES="${UPDATED_SERVICES} argocd"
            # fi
            if [ "$EVENT_PROCESSOR_CHANGED" = "true" ]; then
              echo "   (event-processor code change detected)"
            fi
            # Add other k8s config changes (HPA, Ingress, RBAC, Namespace, etc.)
            if [ "$K8S_FILES_CHANGED" = "true" ]; then
              UPDATED_SERVICES="${UPDATED_SERVICES} k8s-config"
            fi
            
            if [ -n "$UPDATED_SERVICES" ]; then
              COMMIT_MSG="${COMMIT_MSG}\n\nUpdated services:${UPDATED_SERVICES}"
            fi
            
            COMMIT_MSG="${COMMIT_MSG}\n\nArgoCD will automatically sync these changes to cluster."
            
            # 🔍 DEBUG: Show git diff before commit
            echo ""
            echo "🔍 DEBUG: Git diff (staged changes):"
            echo "=========================================="
            git diff --cached --stat || echo "  ⚠️  No staged changes to show"
            echo ""
            echo "🔍 DEBUG: Detailed diff for deployment files:"
            for file in k8s/04-backend-deployment.yaml k8s/05-frontend-deployment.yaml k8s/11-event-processor.yaml k8s/13-argocd-application.yaml; do
              if git diff --cached "$file" 2>/dev/null | grep -q .; then
                echo ""
                echo "📄 Changes in $file:"
                git diff --cached "$file" | head -50 || true
              fi
            done
            echo "=========================================="
            echo ""
            
            # Commit with descriptive message
            echo -e "$COMMIT_MSG" | git commit -F -
            
            # 🔍 DEBUG: Show commit details
            echo ""
            echo "🔍 DEBUG: Commit created:"
            echo "=========================================="
            git log -1 --stat --pretty=format:"Commit: %h%nAuthor: %an <%ae>%nDate: %ad%nMessage: %s%n" || true
            echo "=========================================="
            echo ""
            
            # Push to the same branch that triggered the workflow
            # Fetch and merge any remote changes before pushing
            echo "🔄 Fetching latest changes before push..."
            git fetch origin ${GITHUB_REF_NAME} || echo "⚠️  Fetch failed, continuing with push..."
            
            # Check if remote is ahead
            LOCAL=$(git rev-parse HEAD)
            REMOTE=$(git rev-parse origin/${GITHUB_REF_NAME} 2>/dev/null || echo "")
            
            if [ -n "$REMOTE" ] && [ "$LOCAL" != "$REMOTE" ]; then
              echo "⚠️  Remote has new commits. Merging remote changes..."
              git merge origin/${GITHUB_REF_NAME} --no-edit -m "Merge remote changes before push" || {
                echo "⚠️  Merge conflict detected. Resolving by keeping our k8s manifest changes..."
                # If there are conflicts in k8s files, keep our version
                for file in $DEPLOYMENT_FILES; do
                  if [ -f "$file" ]; then
                    git checkout --ours "$file" 2>/dev/null || true
                    git add "$file"
                  fi
                done
                # Complete the merge
                git commit --no-edit || git commit -m "Merge remote changes, keeping k8s manifest updates" || true
              }
            fi
            
            # Now push
            git push origin HEAD:${GITHUB_REF_NAME}
            
            # 🔍 DEBUG: Verify files are in the commit
            echo ""
            echo "🔍 DEBUG: Files in last commit:"
            echo "=========================================="
            git show --name-status --pretty=format: HEAD | head -20 || true
            echo "=========================================="
            echo ""
            
            # 🔍 DEBUG: Show deployment files content after commit
            echo ""
            echo "🔍 DEBUG: Deployment files after commit (from Git):"
            echo "=========================================="
            for file in k8s/04-backend-deployment.yaml k8s/05-frontend-deployment.yaml k8s/11-event-processor.yaml; do
              if git show HEAD:"$file" >/dev/null 2>&1; then
                echo ""
                echo "📄 File: $file (from Git HEAD)"
                echo "---"
                echo "Image (should be 'latest'):"
                git show HEAD:"$file" | grep "image:" | head -1 || echo "  ⚠️  No image found"
                echo "Pod template annotations:"
                git show HEAD:"$file" | grep -A 5 "annotations:" | grep -E "restartedAt|revision|timestamp|commit-sha" || echo "  ⚠️  No critical annotations found"
              fi
            done
            echo "=========================================="
            echo ""
            
            echo "✅ K8s manifests committed and pushed to GitHub"
            echo "ArgoCD will automatically sync these changes"
          else
            echo "⚠️  No changes to commit (git diff --cached --quiet returned true)"
            echo "🔍 DEBUG: Checking why no changes detected..."
            echo "Staged files:"
            git diff --cached --name-only || echo "  No staged files"
            echo "Unstaged changes:"
            git diff --name-only || echo "  No unstaged changes"
            echo "Workdir status:"
            git status --short || true
          fi
      
      - name: Apply ArgoCD configuration files (if changed)
        if: steps.login-ecr.outcome == 'success'
        run: |
          echo "🔧 Checking if ArgoCD configuration files need to be applied..."
          
          # Only apply if ArgoCD config files changed in this commit
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -qE "(13-argocd-application|14-argocd-config)\.yaml"; then
            echo "📝 ArgoCD configuration files changed, applying to cluster..."
            
            # Determine ArgoCD namespace (check where ArgoCD is installed)
            ARGOCD_NAMESPACE="argocd"
            if ! kubectl get deployment argocd-server -n "$ARGOCD_NAMESPACE" >/dev/null 2>&1; then
              # Fallback: try finans-asistan namespace (for backward compatibility)
              if kubectl get deployment argocd-server -n finans-asistan >/dev/null 2>&1; then
                ARGOCD_NAMESPACE="finans-asistan"
                echo "⚠️  Using legacy namespace 'finans-asistan' for ArgoCD"
              fi
            fi
            
            echo "   Using ArgoCD namespace: $ARGOCD_NAMESPACE"
            
            # Apply ArgoCD ConfigMap (PVC health check customization)
            if [ -f "k8s/14-argocd-config.yaml" ]; then
              echo "   Applying ArgoCD ConfigMap..."
              kubectl apply -f k8s/14-argocd-config.yaml -n "$ARGOCD_NAMESPACE" || {
                echo "⚠️  Failed to apply ArgoCD ConfigMap, continuing..."
              }
              
              # Restart ArgoCD pods to pick up ConfigMap changes (only if ConfigMap changed)
              echo "   Restarting ArgoCD pods to apply ConfigMap changes..."
              kubectl rollout restart statefulset argocd-application-controller -n "$ARGOCD_NAMESPACE" 2>/dev/null || true
              kubectl rollout restart deployment argocd-repo-server -n "$ARGOCD_NAMESPACE" 2>/dev/null || true
              echo "   ✅ ArgoCD pods restart initiated"
            fi
            
            # Apply ArgoCD Application (ignoreDifferences update)
            if [ -f "k8s/13-argocd-application.yaml" ]; then
              echo "   Applying ArgoCD Application..."
              kubectl apply -f k8s/13-argocd-application.yaml -n "$ARGOCD_NAMESPACE" || {
                echo "⚠️  Failed to apply ArgoCD Application, continuing..."
              }
            fi
            
            echo "✅ ArgoCD configuration files applied"
          else
            echo "⏭️  ArgoCD configuration files unchanged, skipping apply (no pod restart needed)"
          fi
      
      - name: Trigger ArgoCD refresh for deployment sync
        if: steps.login-ecr.outcome == 'success' && steps.update-images.outputs.has_changes == 'true'
        run: |
          echo "🔄 Triggering ArgoCD refresh to ensure deployment sync..."
          
          # Determine ArgoCD namespace (check where ArgoCD Application is installed)
          ARGOCD_NAMESPACE="argocd"
          if ! kubectl get application finans-asistan -n "$ARGOCD_NAMESPACE" >/dev/null 2>&1; then
            # Fallback: try finans-asistan namespace (for backward compatibility)
            if kubectl get application finans-asistan -n finans-asistan >/dev/null 2>&1; then
              ARGOCD_NAMESPACE="finans-asistan"
              echo "⚠️  Using legacy namespace 'finans-asistan' for ArgoCD Application"
            else
              echo "⚠️  ArgoCD Application 'finans-asistan' not found in 'argocd' or 'finans-asistan' namespace, skipping refresh"
              exit 0
            fi
          fi
          
          echo "   Using ArgoCD namespace: $ARGOCD_NAMESPACE"
          
          # Trigger hard refresh by patching annotation (this triggers ArgoCD to re-read Git)
          echo "   Triggering ArgoCD hard refresh..."
          kubectl patch application finans-asistan -n "$ARGOCD_NAMESPACE" \
            -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}' \
            --type merge 2>&1 || {
            echo "⚠️  Failed to trigger refresh, ArgoCD will sync automatically"
          }
          
          # Wait a moment for refresh to trigger
          sleep 2
          
          # Remove annotation to allow future refreshes
          kubectl patch application finans-asistan -n "$ARGOCD_NAMESPACE" \
            -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":null}}}' \
            --type merge 2>&1 || true
          
          echo "✅ ArgoCD refresh triggered - sync should happen automatically"


