# ════════════════════════════════════════════════════════════
# FinansAsistan - Development Docker Compose
# Full Stack Development Environment
# ════════════════════════════════════════════════════════════

# Note: Environment variables are set by the setup script
# No env_file needed - variables come from QUICK_START/.env via setup script

services:
  # ──────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finans-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      # WAL Archiving için AWS credentials
      S3_BUCKET: ${S3_BUCKET}
      S3_PREFIX: postgres/wal
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./scripts/archive-wal.sh:/scripts/archive-wal.sh:ro
      - ./scripts/init-postgres-wal.sh:/docker-entrypoint-initdb.d/99-init-wal.sh:ro
      - ./bootstrap/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
    entrypoint: >
      sh -c "
        apk add --no-cache aws-cli bash > /dev/null 2>&1 || true &&
        exec docker-entrypoint.sh postgres
        -c wal_level=replica
        -c archive_mode=on
        -c archive_command='/scripts/archive-wal.sh %p'
        -c archive_timeout=300
        -c max_wal_size=1GB
        -c min_wal_size=80MB
      "
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 180s
      retries: 20
    restart: unless-stopped
    networks:
      - finans-network

  # ──────────────────────────────────────────────────────────
  # Kafka (Message Queue) - KRaft Mode (No Zookeeper)
  # ──────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: finans-kafka-dev
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
      - "9094:9094"
    volumes:
      - kafka_data_dev:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 10
    restart: unless-stopped
    networks:
      - finans-network

  # ──────────────────────────────────────────────────────────
  # Redis (Cache & Session Store)
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finans-redis-dev
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - finans-network

  # ──────────────────────────────────────────────────────────
  # Backend API (Node.js + Express)
  # ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: finans-backend-dev
    ports:
      - "5000:5000"
    volumes:
      - ./back:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      # POSTGRES_* variables (primary)
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # DB_* variables (backward compatibility)
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POOL_SIZE: 20
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-}
      IMAP_SSL: ${IMAP_SSL:-}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SSL: ${SMTP_SSL}
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: finans-backend-dev
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped
    networks:
      - finans-network

  # ──────────────────────────────────────────────────────────
  # Frontend (React Native Web)
  # ──────────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: finans-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm start"
    environment:
      NODE_ENV: development
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "9999:9999"
    volumes:
      - ./front:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'npm start' > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 180s
      retries: 15
    restart: unless-stopped
    networks:
      - finans-network

  # ──────────────────────────────────────────────────────────
  # Event Processor (Kafka Consumer)
  # ──────────────────────────────────────────────────────────
  event-processor:
    build:
      context: .
      dockerfile: ./services/event-processor/Dockerfile
    container_name: finans-event-processor-dev
    environment:
      NODE_ENV: development
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: event-processor-dev
      KAFKA_CONSUMER_GROUP: event-processor-group
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-}
      IMAP_SSL: ${IMAP_SSL:-}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SSL: ${SMTP_SSL}
    volumes:
      - ./services/event-processor:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node.*event-processor' > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 120s
      retries: 10
    restart: unless-stopped
    networks:
      - finans-network

  # ──────────────────────────────────────────────────────────
  # Prometheus (Metrics Collection)
  # ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: finans-prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./monitoring/prometheus/recording-rules.yml:/etc/prometheus/recording-rules.yml:ro
      - prometheus_data_dev:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - finans-network
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Grafana (Visualization)
  # ──────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: finans-grafana-dev
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data_dev:/var/lib/grafana
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - finans-network
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # AlertManager (Alert Management)
  # ──────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: finans-alertmanager-dev
    ports:
      - "9095:9095"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data_dev:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=0.0.0.0:9095'
      - '--web.external-url=http://localhost:9095'
    environment:
      - SMTP_USER=${EMAIL_USER}
      - SMTP_PASSWORD=${EMAIL_PASS}
    depends_on:
      - prometheus
    networks:
      - finans-network
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # PostgreSQL Exporter (Database Metrics)
  # ──────────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: finans-postgres-exporter-dev
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
      PG_EXCLUDE_DATABASES: "template0,template1"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finans-network
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Redis Exporter (Cache Metrics)
  # ──────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: finans-redis-exporter-dev
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - finans-network
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Kafka Exporter (JMX Exporter for Kafka Metrics)
  # ──────────────────────────────────────────────────────────
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: finans-kafka-exporter-dev
    command:
      - '--kafka.server=kafka:9092'
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - finans-network
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Loki (Log Aggregation)
  # ──────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.2
    container_name: finans-loki-dev
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data_dev:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - finans-network
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Promtail (Log Shipper for Loki)
  # ──────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.2
    container_name: finans-promtail-dev
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - finans-network
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # PostgreSQL Backup Service (S3)
  # ──────────────────────────────────────────────────────────
  postgres-backup:
    image: postgres:16-alpine
    container_name: finans-postgres-backup-dev
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      DB_NAME: ${POSTGRES_DB}  # Backward compatibility
      POSTGRES_USER: ${POSTGRES_USER}
      DB_USER: ${POSTGRES_USER}  # Backward compatibility
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_PASSWORD: ${POSTGRES_PASSWORD}  # Backward compatibility
      S3_BUCKET: ${S3_BUCKET}
      S3_PREFIX: postgres/backups
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-300}  # 5 minutes (300 seconds) - default backup interval
    volumes:
      - ./scripts:/scripts
      - backup_data_dev:/tmp/postgres-backups
    command: >
      sh -c "
        apk add --no-cache postgresql-client aws-cli gzip &&
        chmod +x /scripts/backup-postgres.sh &&
        echo 'Starting backup service...' &&
        echo 'Backup interval: ${BACKUP_INTERVAL} seconds' &&
        while true; do
          /scripts/backup-postgres.sh || echo 'Backup failed, will retry...';
          sleep ${BACKUP_INTERVAL};
        done
      "
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'backup-postgres.sh' > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 90s
      retries: 10
    restart: unless-stopped
    networks:
      - finans-network

# ══════════════════════════════════════════════════════════════
# Networks
# ══════════════════════════════════════════════════════════════
networks:
  finans-network:
    name: finans-network
    driver: bridge

# ══════════════════════════════════════════════════════════════
# Volumes
# ══════════════════════════════════════════════════════════════
volumes:
  postgres_data_dev:
    name: finans-postgres-data-dev
  kafka_data_dev:
    name: finans-kafka-data-dev
  redis_data_dev:
    name: finans-redis-data-dev
  backup_data_dev:
    name: finans-backup-data-dev
  prometheus_data_dev:
    name: finans-prometheus-data-dev
  grafana_data_dev:
    name: finans-grafana-data-dev
  alertmanager_data_dev:
    name: finans-alertmanager-data-dev
  loki_data_dev:
    name: finans-loki-data-dev