# ════════════════════════════════════════════════════════════
# FinansAsistan - Development Docker Compose
# Application Stack (Postgres, Backend, Frontend)
# ════════════════════════════════════════════════════════════

services:
  # ──────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finans-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./bootstrap/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 10
    restart: unless-stopped
    networks:
      - finans-network

  # ──────────────────────────────────────────────────────────
  # Backend API (Node.js + Express)
  # ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile.dev
    container_name: finans-backend-dev
    ports:
      - "5000:5000"
    volumes:
      - ./back:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POOL_SIZE: 20
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-}
      IMAP_SSL: ${IMAP_SSL:-}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SSL: ${SMTP_SSL}
      KAFKA_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped
    networks:
      - finans-network

  # ──────────────────────────────────────────────────────────
  # Frontend (React)
  # ──────────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: finans-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm start"
    environment:
      NODE_ENV: development
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "9999:9999"
    volumes:
      - ./front:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'npm start' > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 180s
      retries: 15
    restart: unless-stopped
    networks:
      - finans-network

# ══════════════════════════════════════════════════════════════
# Networks
# ══════════════════════════════════════════════════════════════
networks:
  finans-network:
    name: finans-network
    driver: bridge
