# ============================================================
# FinansAsistan - Redis Backup CronJob
# Automatically backs up Redis AOF file to S3 every 15 minutes
# ============================================================

apiVersion: batch/v1
kind: CronJob
metadata:
  name: redis-backup
  namespace: finans-asistan
spec:
  schedule: "*/15 * * * *"  # Every 15 minutes
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: redis-backup
        spec:
          restartPolicy: OnFailure
          serviceAccountName: redis-backup
          containers:
          - name: redis-backup
            image: bitnami/kubectl:latest
            command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              
              # Install AWS CLI
              apk add --no-cache aws-cli curl
              
              # Download backup script from S3 or use inline script
              if [ -n "${S3_BUCKET:-}" ]; then
                aws s3 cp "s3://${S3_BUCKET}/scripts/backup-redis.sh" /tmp/backup-redis.sh 2>/dev/null || {
                  echo "Warning: Could not download backup script from S3, using inline script"
                }
              fi
              
              # If script downloaded, use it; otherwise use inline logic
              if [ -f /tmp/backup-redis.sh ]; then
                chmod +x /tmp/backup-redis.sh
                exec /tmp/backup-redis.sh
              else
                # Inline backup logic
                NAMESPACE="${NAMESPACE:-finans-asistan}"
                S3_PREFIX="${S3_PREFIX:-redis/backups}"
                
                echo "Finding Redis pod..."
                REDIS_POD=$(kubectl get pods -n "${NAMESPACE}" -l app=redis -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
                
                if [ -z "$REDIS_POD" ]; then
                  echo "Error: Redis pod not found"
                  exit 1
                fi
                
                echo "Found Redis pod: ${REDIS_POD}"
                
                # Trigger AOF rewrite
                kubectl exec -n "${NAMESPACE}" "${REDIS_POD}" -- redis-cli BGREWRITEAOF 2>/dev/null || true
                sleep 5
                
                # Create backup directory
                BACKUP_DIR="/tmp/redis-backups"
                mkdir -p "${BACKUP_DIR}"
                TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
                BACKUP_FILE="${BACKUP_DIR}/appendonly_${TIMESTAMP}.aof"
                
                # Copy AOF file
                kubectl cp "${NAMESPACE}/${REDIS_POD}:/data/appendonly.aof" "${BACKUP_FILE}" 2>/dev/null || {
                  echo "Warning: Failed to copy appendonly.aof, trying to find AOF file..."
                  AOF_PATH=$(kubectl exec -n "${NAMESPACE}" "${REDIS_POD}" -- sh -c "find /data -name 'appendonly.aof' -type f 2>/dev/null | head -1" || echo "")
                  if [ -n "$AOF_PATH" ]; then
                    kubectl cp "${NAMESPACE}/${REDIS_POD}:${AOF_PATH}" "${BACKUP_FILE}" 2>/dev/null || exit 1
                  else
                    echo "Error: Could not find AOF file"
                    exit 1
                  fi
                }
                
                if [ ! -f "${BACKUP_FILE}" ] || [ ! -s "${BACKUP_FILE}" ]; then
                  echo "Error: Backup file is empty or does not exist"
                  exit 1
                fi
                
                # Upload to S3
                S3_PATH="s3://${S3_BUCKET}/${S3_PREFIX}/appendonly_${TIMESTAMP}.aof"
                aws s3 cp "${BACKUP_FILE}" "${S3_PATH}" \
                  --region "${AWS_REGION}" \
                  --storage-class STANDARD_IA \
                  --metadata "timestamp=${TIMESTAMP},pod=${REDIS_POD}"
                
                if [ $? -eq 0 ]; then
                  echo "Backup uploaded successfully: ${S3_PATH}"
                  rm -f "${BACKUP_FILE}"
                  
                  # Clean up old backups (keep last 10)
                  MIN_KEEP_COUNT=10
                  aws s3 ls "s3://${S3_BUCKET}/${S3_PREFIX}/" --recursive | \
                    grep "appendonly_.*\.aof$" | \
                    sort -r | \
                    tail -n +$((MIN_KEEP_COUNT + 1)) | \
                    awk '{print $4}' | \
                    while read -r old_backup; do
                      if [ -n "$old_backup" ]; then
                        aws s3 rm "s3://${S3_BUCKET}/${old_backup}" --region "${AWS_REGION}" 2>/dev/null || true
                      fi
                    done
                else
                  echo "Error: Failed to upload backup to S3"
                  exit 1
                fi
              fi
            env:
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: S3_BUCKET
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AWS_REGION
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: NAMESPACE
              value: finans-asistan
            - name: S3_PREFIX
              value: redis/backups
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "256Mi"
                cpu: "200m"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-backup
  namespace: finans-asistan
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: redis-backup
  namespace: finans-asistan
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["pods"]
  resourceNames: ["*"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: redis-backup
  namespace: finans-asistan
subjects:
- kind: ServiceAccount
  name: redis-backup
  namespace: finans-asistan
roleRef:
  kind: Role
  name: redis-backup
  apiGroup: rbac.authorization.k8s.io

