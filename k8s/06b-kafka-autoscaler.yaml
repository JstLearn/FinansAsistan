# ============================================================
# FinansAsistan - Kafka Auto-Scaler (CronJob)
# Auto-scaling for Kafka NodePools based on metrics
# Note: KafkaNodePool does not support HPA directly
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-autoscaler-config
  namespace: finans-asistan
data:
  autoscaler.sh: |
    #!/bin/bash
    set -e
    
    NAMESPACE="finans-asistan"
    MIN_REPLICAS_CONTROLLER=1
    MAX_REPLICAS_CONTROLLER=3
    MIN_REPLICAS_BROKER=1
    MAX_REPLICAS_BROKER=5
    CPU_THRESHOLD=75
    MEMORY_THRESHOLD=75
    SCALE_UP_THRESHOLD=80
    SCALE_DOWN_THRESHOLD=50
    
    log() {
        echo "[$(date +'%Y-%m-%d %H:%M:%S')] $1"
    }
    
    # Get current replica count for Kafka Controller
    get_current_replicas_controller() {
        kubectl get kafkanodepool kafka-cluster-controllers -n $NAMESPACE -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "1"
    }
    
    # Get current replica count for Kafka Broker
    get_current_replicas_broker() {
        kubectl get kafkanodepool kafka-cluster-brokers -n $NAMESPACE -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "1"
    }
    
    # Get average CPU usage for Kafka pods
    get_avg_cpu_usage() {
        local pool_name=$1
        kubectl top pods -n $NAMESPACE -l strimzi.io/nodepool=$pool_name --no-headers 2>/dev/null | \
            awk '{sum+=$2; count++} END {if (count>0) print int(sum/count); else print 0}'
    }
    
    # Get average Memory usage for Kafka pods
    get_avg_memory_usage() {
        local pool_name=$1
        kubectl top pods -n $NAMESPACE -l strimzi.io/nodepool=$pool_name --no-headers 2>/dev/null | \
            awk '{gsub(/Mi|Gi/, "", $3); if ($3 ~ /Gi/) sum+=$3*1024; else sum+=$3; count++} END {if (count>0) print int(sum/count); else print 0}'
    }
    
    # Scale Kafka Controller
    scale_kafka_controller() {
        local current_replicas=$(get_current_replicas_controller)
        local cpu_usage=$(get_avg_cpu_usage kafka-cluster-controllers)
        local memory_usage=$(get_avg_memory_usage kafka-cluster-controllers)
        local new_replicas=$current_replicas
        
        # Scale up if CPU or Memory usage is high
        if [ "$cpu_usage" -gt $SCALE_UP_THRESHOLD ] || [ "$memory_usage" -gt $SCALE_UP_THRESHOLD ]; then
            if [ "$current_replicas" -lt $MAX_REPLICAS_CONTROLLER ]; then
                new_replicas=$((current_replicas + 1))
                log "Scaling up Kafka Controller: $current_replicas -> $new_replicas (CPU: ${cpu_usage}%, Memory: ${memory_usage}%)"
                kubectl patch kafkanodepool kafka-cluster-controllers -n $NAMESPACE --type='merge' -p="{\"spec\":{\"replicas\":$new_replicas}}" || true
            fi
        # Scale down if CPU and Memory usage is low
        elif [ "$cpu_usage" -lt $SCALE_DOWN_THRESHOLD ] && [ "$memory_usage" -lt $SCALE_DOWN_THRESHOLD ]; then
            if [ "$current_replicas" -gt $MIN_REPLICAS_CONTROLLER ]; then
                new_replicas=$((current_replicas - 1))
                log "Scaling down Kafka Controller: $current_replicas -> $new_replicas (CPU: ${cpu_usage}%, Memory: ${memory_usage}%)"
                kubectl patch kafkanodepool kafka-cluster-controllers -n $NAMESPACE --type='merge' -p="{\"spec\":{\"replicas\":$new_replicas}}" || true
            fi
        fi
    }
    
    # Scale Kafka Broker
    scale_kafka_broker() {
        local current_replicas=$(get_current_replicas_broker)
        local cpu_usage=$(get_avg_cpu_usage kafka-cluster-brokers)
        local memory_usage=$(get_avg_memory_usage kafka-cluster-brokers)
        local new_replicas=$current_replicas
        
        # Scale up if CPU or Memory usage is high
        if [ "$cpu_usage" -gt $SCALE_UP_THRESHOLD ] || [ "$memory_usage" -gt $SCALE_UP_THRESHOLD ]; then
            if [ "$current_replicas" -lt $MAX_REPLICAS_BROKER ]; then
                new_replicas=$((current_replicas + 1))
                log "Scaling up Kafka Broker: $current_replicas -> $new_replicas (CPU: ${cpu_usage}%, Memory: ${memory_usage}%)"
                kubectl patch kafkanodepool kafka-cluster-brokers -n $NAMESPACE --type='merge' -p="{\"spec\":{\"replicas\":$new_replicas}}" || true
            fi
        # Scale down if CPU and Memory usage is low
        elif [ "$cpu_usage" -lt $SCALE_DOWN_THRESHOLD ] && [ "$memory_usage" -lt $SCALE_DOWN_THRESHOLD ]; then
            if [ "$current_replicas" -gt $MIN_REPLICAS_BROKER ]; then
                new_replicas=$((current_replicas - 1))
                log "Scaling down Kafka Broker: $current_replicas -> $new_replicas (CPU: ${cpu_usage}%, Memory: ${memory_usage}%)"
                kubectl patch kafkanodepool kafka-cluster-brokers -n $NAMESPACE --type='merge' -p="{\"spec\":{\"replicas\":$new_replicas}}" || true
            fi
        fi
    }
    
    # Main execution
    log "Starting Kafka auto-scaling check..."
    scale_kafka_controller
    scale_kafka_broker
    log "Kafka auto-scaling check completed"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-autoscaler
  namespace: finans-asistan

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kafka-autoscaler
  namespace: finans-asistan
rules:
- apiGroups: ["kafka.strimzi.io"]
  resources: ["kafkanodepools"]
  verbs: ["get", "patch", "update"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["list", "get"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kafka-autoscaler
  namespace: finans-asistan
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kafka-autoscaler
subjects:
- kind: ServiceAccount
  name: kafka-autoscaler
  namespace: finans-asistan

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kafka-autoscaler
  namespace: finans-asistan
spec:
  schedule: "*/5 * * * *"  # Run every 5 minutes
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: kafka-autoscaler
          containers:
          - name: autoscaler
            image: bitnami/kubectl:latest
            command:
            - /bin/bash
            - /scripts/autoscaler.sh
            volumeMounts:
            - name: autoscaler-script
              mountPath: /scripts
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "128Mi"
                cpu: "100m"
          volumes:
          - name: autoscaler-script
            configMap:
              name: kafka-autoscaler-config
              defaultMode: 0755
          restartPolicy: OnFailure

