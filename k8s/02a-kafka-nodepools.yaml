apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka-cluster-controllers
  namespace: finans-asistan
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  replicas: 1
  roles:
    - controller
  template:
    pod:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: leader
                operator: In
                values:
                - "true"
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: strimzi.io/cluster
                  operator: In
                  values:
                  - kafka-cluster
                - key: strimzi.io/kind
                  operator: In
                  values:
                  - KafkaNodePool
                - key: strimzi.io/nodepool
                  operator: In
                  values:
                  - kafka-cluster-controllers
              topologyKey: kubernetes.io/hostname
  storage:
    type: persistent-claim
    class: hostpath
    size: 20Gi
    deleteClaim: false
  resources:
    requests:
      memory: "256Mi"  # Minimum request - start small, scale with HPA
      cpu: "200m"      # Minimum request - start small, scale with HPA
    limits:
      memory: "2560Mi"  # Limit = request * 10 (256Mi * 10 = 2.5Gi)
      cpu: "2000m"      # Limit = request * 10 (200m * 10 = 2)

---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka-cluster-brokers
  namespace: finans-asistan
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  replicas: 1
  roles:
    - broker
  template:
    pod:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: leader
                operator: In
                values:
                - "true"
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: strimzi.io/cluster
                  operator: In
                  values:
                  - kafka-cluster
                - key: strimzi.io/kind
                  operator: In
                  values:
                  - KafkaNodePool
                - key: strimzi.io/nodepool
                  operator: In
                  values:
                  - kafka-cluster-brokers
              topologyKey: kubernetes.io/hostname
  storage:
    type: persistent-claim
    class: hostpath
    size: 100Gi
    deleteClaim: false
  resources:
    requests:
      memory: "512Mi"  # Minimum request - start small, scale with HPA
      cpu: "300m"      # Minimum request - start small, scale with HPA
    limits:
      memory: "5120Mi"  # Limit = request * 10 (512Mi * 10 = 5Gi)
      cpu: "3000m"      # Limit = request * 10 (300m * 10 = 3)

