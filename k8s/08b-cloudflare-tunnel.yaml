# ============================================================
# FinansAsistan - Cloudflare Tunnel
# Port yönlendirme gerektirmeden her yerden erişim
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: cloudflare-tunnel

---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-tunnel-token
  namespace: cloudflare-tunnel
type: Opaque
stringData:
  # Token burada placeholder; gerçek token GitHub Actions tarafından Kubernetes secret'ına yazılır.
  token: "managed-by-github-actions"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflare-tunnel
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      serviceAccountName: cloudflared
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:latest
        command:
        - /usr/local/bin/cloudflared
        args:
        - tunnel
        - --no-autoupdate
        - run
        - --token
        - $(TUNNEL_TOKEN)
        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflare-tunnel-token
              key: token

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudflared
  namespace: cloudflare-tunnel

