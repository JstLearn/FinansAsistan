# ============================================================
# FinansAsistan - Kafka Topics (Strimzi)
# Tüm Kafka topic'leri için Custom Resources
# Not: Kubernetes resource name'leri nokta içeremez, bu yüzden tire kullanıyoruz
# Gerçek topic isimleri spec.topicName ile belirtilir (nokta içerebilir)
# ============================================================

# User Domain Topics
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: user-registered
  namespace: finans-asistan
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  topicName: user.registered
  partitions: 6
  replicas: 1
  config:
    retention.ms: 7776000000  # 90 days
    segment.ms: 86400000      # 1 day

---
apiVersion: kafka.strimzi.io/v1
