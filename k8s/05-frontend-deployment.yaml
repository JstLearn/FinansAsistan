apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: finans-asistan
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        argocd.argoproj.io/sync-wave: '0'
        app.finans-asistan.io/image-digest: sha256:6553ebae730356b5fa5c239ba8b5912e6818efa006d85b1704ee833e30cd37d2
        kubectl.kubernetes.io/restartedAt: '2025-12-20T14:42:08Z'
        deployment.kubernetes.io/revision: 20251220144056-9a007c8
        deployment.kubernetes.io/deployment-timestamp: '20251220144056'
        deployment.kubernetes.io/commit-sha: 9a007c8241972ee8ab8b5d574798d640520eb0a0
    spec:
      serviceAccountName: init-container
      imagePullSecrets:
      - name: ecr-registry-secret
      initContainers:
      - name: wait-for-backend
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - "echo \"Waiting for Backend to be ready...\"\nmax_wait=600  # 10 minutes max\nelapsed=0\ncheck_interval=5\n\nwhile [ $elapsed -lt $max_wait ]; do\n  # Check Backend Deployment\n  backend_ready=$(kubectl get deployment backend -n finans-asistan -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo \"0\")\n  backend_desired=$(kubectl get deployment backend -n finans-asistan -o jsonpath='{.spec.replicas}' 2>/dev/null || echo \"1\")\n  \n  if [ \"$backend_ready\" = \"$backend_desired\" ] && [ -n \"$backend_ready\" ] && [ \"$backend_ready\" != \"0\" ]; then\n    echo \"Backend is ready!\"\n    exit 0\n  fi\n  \n  echo \"Backend not ready yet (${elapsed}s elapsed): ${backend_ready}/${backend_desired}\"\n  sleep $check_interval\n  elapsed=$((elapsed + check_interval))\ndone\n\necho \"Timeout waiting for Backend to be ready\"\nexit 1\n"
        resources:
          requests:
            memory: 32Mi
            cpu: 10m
          limits:
            memory: 64Mi
            cpu: 100m
      containers:
      - name: frontend
        image: 050907117703.dkr.ecr.eu-central-1.amazonaws.com/finans-asistan-frontend-production:latest
        imagePullPolicy: Always
        env:
        - name: IMAGE_DIGEST
          value: sha256:6553ebae730356b5fa5c239ba8b5912e6818efa006d85b1704ee833e30cd37d2
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: 128Mi
            cpu: 50m
          limits:
            memory: 1280Mi
            cpu: 500m
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: finans-asistan
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    name: http
