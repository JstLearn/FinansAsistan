# ============================================================
# FinansAsistan - Init Container RBAC
# ServiceAccount and RBAC for init containers to check dependency readiness
# ============================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: init-container
  namespace: finans-asistan

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: init-container
  namespace: finans-asistan
rules:
- apiGroups: ["apps"]
  resources:
  - statefulsets
  - deployments
  verbs: ["get", "list"]
- apiGroups: ["kafka.strimzi.io"]
  resources:
  - kafkas
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: init-container
  namespace: finans-asistan
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: init-container
subjects:
- kind: ServiceAccount
  name: init-container
  namespace: finans-asistan

