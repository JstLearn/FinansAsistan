# ============================================================
# FinansAsistan - ArgoCD HPA
# Auto-scaling for ArgoCD components
# ============================================================
# Note: Apply this after ArgoCD is installed

---
# ============================================================
# ArgoCD Server HPA (Deployment)
# Auto-scaling for ArgoCD Server
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: argocd-server-hpa
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: argocd-server
  minReplicas: 1  # Will be updated dynamically based on worker node count (ensures at least 1 pod on leader node)
  maxReplicas: 100  # Distributed service - HPA creates new pods when limits approached (runs on leader + worker nodes)
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 90  # CPU target - more aggressive scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80  # Optimal scaling target (limit'e yaklaşmadan önce yeni pod)
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 180
      selectPolicy: Min

---
# ============================================================
# ArgoCD Repo Server HPA (Deployment)
# Auto-scaling for ArgoCD Repo Server
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: argocd-repo-server-hpa
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: argocd-repo-server
  minReplicas: 1  # Will be updated dynamically based on worker node count (ensures at least 1 pod on leader node)
  maxReplicas: 100  # Distributed service - HPA creates new pods when limits approached (runs on leader + worker nodes)
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 90  # CPU target - more aggressive scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80  # Optimal scaling target (limit'e yaklaşmadan önce yeni pod)
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 180
      selectPolicy: Min


