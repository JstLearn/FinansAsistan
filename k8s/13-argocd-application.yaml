# ============================================================
# FinansAsistan - ArgoCD Application
# Syncs from Git repository to Kubernetes cluster
# ============================================================
# 
# IMPORTANT: This Application file is excluded from ArgoCD sync to prevent circular dependency.
# If this file is modified, it must be manually applied:
#   kubectl apply -f k8s/13-argocd-application.yaml -n argocd
# 
# ArgoCD will automatically sync all other k8s files when they change in Git.
# ============================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finans-asistan
  annotations:
    # refresh-time annotation removed - syncPolicy.automated handles automatic sync
    # ArgoCD will automatically detect Git changes and sync (configured in syncPolicy.automated)
  namespace: argocd  # ArgoCD Application must be in the same namespace as ArgoCD installation
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    # Git repository as source
    repoURL: https://github.com/JstLearn/FinansAsistan.git
    targetRevision: master
    path: k8s
    directory:
      recurse: true
      include: '*.yaml'
      exclude: |
        12-argocd-install.yaml
        13-argocd-application.yaml
      # Sadece ArgoCD kurulum dosyaları exclude edilir
      # Tüm servisler (traefik, monitoring, redis, vb.) ArgoCD tarafından sync edilir
  
  destination:
    server: https://kubernetes.default.svc
    namespace: finans-asistan
  
  syncPolicy:
    automated:
      prune: true          # Remove resources that are no longer in Git
      selfHeal: true       # Automatically sync when cluster state drifts
      allowEmpty: true     # Allow sync to complete even if some resources are not healthy (prevents sync hanging)
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - SkipDryRunOnMissingResource=true  # Skip dry-run for missing resources
      - ServerSideApply=true              # Use server-side apply for more reliable sync
      - SyncOrphanResources=false         # Don't sync orphaned resources
      - Prune=true                        # Prune resources that are no longer in Git
      - ApplyOutOfSyncOnly=false          # Apply all resources, not just out of sync ones
    retry:
      limit: 5  # Retry up to 5 times if sync fails
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 30s  # Maximum 30s between retries

  # Ignore differences for resources that may cause sync to hang or hold secrets
  ignoreDifferences:
  - group: argoproj.io
    kind: Application
    name: finans-asistan
    namespace: argocd
    jsonPointers:
    - /status  # Ignore Application status to prevent circular dependency
    - /status/operationState  # Ignore operation state to prevent sync hanging
    - /status/conditions  # Ignore conditions to prevent sync hanging
  - group: networking.k8s.io
    kind: Ingress
    jsonPointers:
    - /status  # Ignore Ingress status to prevent sync hanging on health checks
    - /metadata/annotations/argocd.argoproj.io~1health.lua  # Ignore health check annotation changes
    - /metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration  # Ignore kubectl annotations
  - group: autoscaling
    kind: HorizontalPodAutoscaler
    jsonPointers:
    - /status  # Ignore HPA status to prevent sync hanging on health checks
    - /metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration  # Ignore kubectl annotations
  - group: ""
    kind: Secret
    name: cloudflare-tunnel-token
    namespace: cloudflare-tunnel
    jsonPointers:
    - /data
    - /stringData
  # ArgoCD repository secret - managed by workflow, not by Git
  # This prevents ArgoCD from pruning or modifying the secret
  - group: ""
    kind: Secret
    name: argocd-repo-github
    namespace: argocd
    jsonPointers:
    - /data
    - /stringData
    - /metadata/labels
  - group: apps
    kind: StatefulSet
    name: postgres
    namespace: finans-asistan
    jsonPointers:
    - /status
    - /metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration
    - /spec/persistentVolumeClaimRetentionPolicy
    - /spec/volumeClaimTemplates
  - group: ""
    kind: PersistentVolumeClaim
    jsonPointers:
    - /status  # Ignore PVC status for all PVCs to prevent sync hanging on Pending PVCs
    - /metadata/finalizers  # Ignore finalizers that may cause issues
    - /spec  # Ignore PVC spec to prevent sync from waiting for PVC creation
    - /metadata/annotations  # Ignore all annotations
  
  - group: apps
    kind: DaemonSet
    name: cadvisor
    namespace: finans-asistan
    jsonPointers:
    - /status  # Ignore DaemonSet status to prevent sync hanging on unhealthy cadvisor
    - /metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration  # Ignore kubectl annotations
  
  revisionHistoryLimit: 10

---