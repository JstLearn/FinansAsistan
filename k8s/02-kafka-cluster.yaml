# ============================================================
# FinansAsistan - Kafka Cluster (Strimzi)
# Kafka 3.6 with tiered storage (S3)
# ============================================================

apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka-cluster
  namespace: finans-asistan
spec:
  kafka:
    version: 4.0.0
    listeners:
    - name: plain
      port: 9092
      type: internal
      tls: false
    - name: tls
      port: 9093
      type: internal
      tls: true
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      # Note: log.message.format.version and inter.broker.protocol.version are not used in KRaft mode
      # Tiered storage (S3) yeniden AKTIF
      remote.storage.enable: "true"
      remote.log.manager.class.name: "org.apache.kafka.tiered.storage.remote.log.RemoteLogManager"
      remote.log.storage.manager.class.name: "org.apache.kafka.tiered.storage.remote.log.RemoteLogStorageManager"
  entityOperator:
    topicOperator:
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "1280Mi"  # Limit = request * 10 (128Mi * 10)
          cpu: "1000m"      # Limit = request * 10 (100m * 10)
    userOperator:
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "1280Mi"  # Limit = request * 10 (128Mi * 10)
          cpu: "1000m"      # Limit = request * 10 (100m * 10)

# Kafka Topics ayrı dosyada: k8s/03-kafka-topics.yaml

