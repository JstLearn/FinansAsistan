# ============================================================
# FinansAsistan - Monitoring Stack
# Prometheus, Grafana, AlertManager, Exporters
# ============================================================

# ============================================================
# Monitoring Stack - All services in finans-asistan namespace
# ============================================================
# ============================================================
# Prometheus ServiceAccount & RBAC
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: finans-asistan

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
- apiGroups: [""]
  resources:
  - nodes
  - nodes/proxy
  - nodes/metrics
  - services
  - endpoints
  - pods
  verbs: ["get", "list", "watch"]
- apiGroups:
  - extensions
  resources:
  - ingresses
  verbs: ["get", "list", "watch"]
- nonResourceURLs: ["/metrics"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: finans-asistan

---
# ============================================================
# Prometheus ConfigMap
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: finans-asistan
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'finans-asistan'
        environment: 'production'
    
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093
    
    rule_files:
      - '/etc/prometheus/rules/*.yml'
    
    scrape_configs:
      # Prometheus itself
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      
      # Backend API
      - job_name: 'backend-api'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - finans-asistan
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
        metrics_path: '/metrics'
      
      # PostgreSQL Exporter
      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres-exporter:9187']
        scrape_interval: 30s
      
      # Redis Exporter
      - job_name: 'redis'
        static_configs:
          - targets: ['redis-exporter:9121']
        scrape_interval: 30s
      
      # Kafka Exporter
      - job_name: 'kafka'
        static_configs:
          - targets: ['kafka-exporter:9308']
        scrape_interval: 30s
      
      # Kubernetes API Server
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https
      
      # Kubernetes Nodes
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
      
      # Kubernetes Pods (with prometheus.io/scrape annotation)
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
      
      # Node Exporter
      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: node-exporter

  alerts.yml: |
    groups:
      - name: backend_alerts
        interval: 30s
        rules:
          - alert: HighErrorRate
            expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High error rate detected"
              description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.service }}"
          
          - alert: HighResponseTime
            expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High response time detected"
              description: "95th percentile response time is {{ $value }}s for {{ $labels.service }}"
          
          - alert: ServiceDown
            expr: up{job="backend-api"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Backend API is down"
              description: "Backend API has been down for more than 1 minute"
      
      - name: database_alerts
        interval: 30s
        rules:
          - alert: DatabaseConnectionFailed
            expr: pg_up == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Database connection failed"
              description: "PostgreSQL database is not accessible"
          
          - alert: HighDatabaseConnections
            expr: pg_stat_database_numbackends > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High number of database connections"
              description: "Database has {{ $value }} active connections"
      
      - name: redis_alerts
        interval: 30s
        rules:
          - alert: RedisDown
            expr: redis_up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Redis is down"
              description: "Redis cache service is not accessible"
      
      - name: kafka_alerts
        interval: 30s
        rules:
          - alert: KafkaBrokerDown
            expr: kafka_broker_info == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Kafka broker is down"
              description: "Kafka broker {{ $labels.broker_id }} is not accessible"
          
          - alert: HighConsumerLag
            expr: kafka_consumer_lag_sum > 10000
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High Kafka consumer lag"
              description: "Consumer lag is {{ $value }} messages for topic {{ $labels.topic }}"
      
      - name: kubernetes_alerts
        interval: 30s
        rules:
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod is crash looping"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is crash looping"
          
          - alert: NodeNotReady
            expr: kube_node_status_condition{condition="Ready",status="true"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Kubernetes node is not ready"
              description: "Node {{ $labels.node }} is not ready"

---
# ============================================================
# Prometheus PersistentVolumeClaim
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: finans-asistan
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: hostpath

---
# ============================================================
# Prometheus StatefulSet
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus
  namespace: finans-asistan
spec:
  serviceName: prometheus
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
      annotations:
        kubectl.kubernetes.io/restartedAt: "2025-12-12T12:19:57Z"
        deployment.kubernetes.io/revision: "20251212121957-9fd34cf"
        deployment.kubernetes.io/deployment-timestamp: "20251212121957"
        deployment.kubernetes.io/commit-sha: "9fd34cf344cf2fb7f91fceeb23c6f2c7b1aef963"
    spec:
      serviceAccountName: prometheus
      # Schedule Prometheus only on leader node (physical or EC2)
      # HPA cannot scale this service - must stay on leader node only
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: leader
                operator: In
                values:
                - "true"
      containers:
      - name: prometheus
        image: prom/prometheus:v2.48.0
        env:
        - name: IMAGE_DIGEST
          value: "latest"
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
          - '--storage.tsdb.retention.time=30d'
          - '--web.console.libraries=/usr/share/prometheus/console_libraries'
          - '--web.console.templates=/usr/share/prometheus/consoles'
          - '--web.enable-lifecycle'
        ports:
        - containerPort: 9090
          name: http
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus
        - name: prometheus-data
          mountPath: /prometheus
        resources:
          requests:
            memory: "128Mi"  # Minimum request - start small, scale with HPA
            cpu: "100m"      # Minimum request - start small, scale with HPA
          limits:
            memory: "4Gi"    # R6G Large: 16GB RAM, ~14.4GB usable, Prometheus gets 4GB
            cpu: "1000m"      # Limit = request * 10 (100m * 10)
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: prometheus-config
        configMap:
          name: prometheus-config
      - name: prometheus-data
        persistentVolumeClaim:
          claimName: prometheus-data

---
# ============================================================
# Prometheus Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: finans-asistan
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
    name: http

---
# ============================================================
# AlertManager ConfigMap
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: finans-asistan
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      # SMTP configuration (will be updated by bootstrap.sh from app-secrets)
      # If EMAIL_USER and EMAIL_PASS are not set, email alerts will be disabled
      smtp_smarthost: 'mail.finansasistan.com:587'
      smtp_from: 'hello@finansasistan.com'
      smtp_auth_username: 'CHANGE_ME_IN_BOOTSTRAP'
      smtp_auth_password: 'CHANGE_ME_IN_BOOTSTRAP'
      smtp_require_tls: true
      # Slack webhook (optional, uncomment and set SLACK_WEBHOOK_URL in Secret if needed)
      # slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
    
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'default'
      routes:
      - match:
          severity: critical
        receiver: 'critical'
        continue: true
      - match:
          severity: warning
        receiver: 'warning'
        group_wait: 1m
        group_interval: 5m
        repeat_interval: 24h
      - match:
          alertname: DatabaseConnectionFailed
        receiver: 'database-team'
        continue: true
      - match:
          job: backend-api
        receiver: 'backend-team'
        continue: true
    
    # Inhibition rules (suppress warnings when critical alerts fire)
    inhibit_rules:
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname', 'cluster', 'service']
    
    receivers:
    - name: 'default'
      email_configs:
      - to: 'devops@finansasistan.com'
        headers:
          Subject: 'FinansAsistan Alert: {{ .GroupLabels.alertname }}'
        html: |
          <h2>FinansAsistan Alert</h2>
          <p><strong>Alert:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Service:</strong> {{ .GroupLabels.service }}</p>
          <p><strong>Description:</strong> {{ range .Alerts }}{{ .Annotations.description }}{{ end }}</p>
          <p><strong>Time:</strong> {{ .StartsAt }}</p>
      # Slack webhook (optional)
      # slack_configs:
      # - channel: '#alerts'
      #   title: 'FinansAsistan Alert'
      #   text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}'
    
    - name: 'critical'
      email_configs:
      - to: 'oncall@finansasistan.com'
        headers:
          Subject: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        html: |
          <h2 style="color: red;">Critical Alert</h2>
          <p><strong>Alert:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Service:</strong> {{ .GroupLabels.service }}</p>
          <p><strong>Description:</strong> {{ range .Alerts }}{{ .Annotations.description }}{{ end }}</p>
          <p><strong>Time:</strong> {{ .StartsAt }}</p>
          <p><strong>Status:</strong> {{ range .Alerts }}{{ .Status }}{{ end }}</p>
      # Slack webhook (optional)
      # slack_configs:
      # - channel: '#critical-alerts'
      #   title: '🚨 CRITICAL Alert'
      #   text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}'
    
    - name: 'warning'
      email_configs:
      - to: 'devops@finansasistan.com'
        headers:
          Subject: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
        html: |
          <h2 style="color: orange;">Warning Alert</h2>
          <p><strong>Alert:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Service:</strong> {{ .GroupLabels.service }}</p>
          <p><strong>Description:</strong> {{ range .Alerts }}{{ .Annotations.description }}{{ end }}</p>
          <p><strong>Time:</strong> {{ .StartsAt }}</p>
      # Slack webhook (optional)
      # slack_configs:
      # - channel: '#alerts'
      #   title: '⚠️  Warning Alert'
      #   text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}'
    
    - name: 'database-team'
      email_configs:
      - to: 'dba@finansasistan.com'
        headers:
          Subject: 'Database Alert: {{ .GroupLabels.alertname }}'
        html: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    
    - name: 'backend-team'
      email_configs:
      - to: 'backend@finansasistan.com'
        headers:
          Subject: 'Backend Alert: {{ .GroupLabels.alertname }}'
        html: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

---
# ============================================================
# AlertManager PersistentVolumeClaim
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertmanager-data
  namespace: finans-asistan
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: hostpath

---
# ============================================================
# AlertManager Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: finans-asistan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      # Distributed service - HPA scales horizontally across all nodes
      # Each node should have at least 1 pod, but can have more based on load
      # No affinity constraints - pods can be scheduled anywhere based on resources
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.26.0
        env:
        - name: IMAGE_DIGEST
          value: "latest"
        args:
          - '--config.file=/etc/alertmanager/alertmanager.yml'
          - '--storage.path=/alertmanager'
        ports:
        - containerPort: 9093
          name: http
        volumeMounts:
        - name: alertmanager-config
          mountPath: /etc/alertmanager
        - name: alertmanager-data
          mountPath: /alertmanager
        resources:
          requests:
            memory: "64Mi"   # Minimum request - start small, scale with HPA
            cpu: "50m"       # Minimum request - start small, scale with HPA
          limits:
            memory: "512Mi"  # R6G Large: 16GB RAM, ~14.4GB usable, AlertManager gets 512MB
            cpu: "500m"      # Limit = request * 10 (50m * 10)
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9093
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9093
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: alertmanager-config
        configMap:
          name: alertmanager-config
      - name: alertmanager-data
        persistentVolumeClaim:
          claimName: alertmanager-data

---
# ============================================================
# AlertManager Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: finans-asistan
spec:
  type: ClusterIP
  selector:
    app: alertmanager
  ports:
  - port: 9093
    targetPort: 9093
    name: http

---
# ============================================================
# Grafana ConfigMap (Datasources)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: finans-asistan
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
        jsonData:
          timeInterval: "15s"
          httpMethod: POST

---
# ============================================================
# Grafana ConfigMap (Dashboard Provisioning)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  namespace: finans-asistan
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/dashboards
          foldersFromFilesStructure: true

---
# ============================================================
# Grafana ConfigMap (Cluster Overview Dashboard)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cluster-overview
  namespace: finans-asistan
  labels:
    grafana_dashboard: "1"
data:
  cluster-overview.json: |
    {
      "dashboard": {
        "title": "FinansAsistan - Cluster Overview",
        "description": "Tüm node'larda pod sayıları ve kaynak kullanımını gösterir",
        "tags": ["cluster", "nodes", "pods", "resources"],
        "timezone": "browser",
        "schemaVersion": 27,
        "version": 1,
        "refresh": "30s",
        "panels": [
          {
            "id": 1,
            "title": "Node Overview - CPU & Memory Usage",
            "type": "timeseries",
            "gridPos": {"h": 10, "w": 24, "x": 0, "y": 0},
            "targets": [
              {
                "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
                "legendFormat": "{{instance}} - CPU %",
                "refId": "A"
              },
              {
                "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
                "legendFormat": "{{instance}} - Memory %",
                "refId": "B"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "percent",
                "min": 0,
                "max": 100
              }
            },
            "options": {
              "legend": {"displayMode": "table", "placement": "right"}
            }
          },
          {
            "id": 2,
            "title": "Pod Count per Node",
            "type": "bargauge",
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 10},
            "targets": [
              {
                "expr": "count by (instance) (container_cpu_usage_seconds_total{container!=\"POD\", container!=\"\", namespace!=\"kube-system\"})",
                "legendFormat": "{{instance}}",
                "refId": "A"
              }
            ],
            "options": {
              "orientation": "horizontal",
              "displayMode": "gradient"
            },
            "fieldConfig": {
              "defaults": {
                "unit": "short",
                "color": {"mode": "palette-classic"}
              }
            }
          },
          {
            "id": 3,
            "title": "Pod Distribution by Namespace",
            "type": "piechart",
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 10},
            "targets": [
              {
                "expr": "count by (namespace) (container_cpu_usage_seconds_total{container!=\"POD\", container!=\"\", namespace!=\"kube-system\"})",
                "legendFormat": "{{namespace}}",
                "refId": "A"
              }
            ],
            "options": {
              "pieType": "pie",
              "tooltip": {"mode": "multi"},
              "legend": {"displayMode": "table", "placement": "right"}
            }
          },
          {
            "id": 4,
            "title": "Node Resource Usage (CPU)",
            "type": "stat",
            "gridPos": {"h": 6, "w": 8, "x": 0, "y": 18},
            "targets": [
              {
                "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
                "legendFormat": "{{instance}}",
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "percent",
                "color": {"mode": "thresholds"},
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    {"value": 0, "color": "green"},
                    {"value": 70, "color": "yellow"},
                    {"value": 85, "color": "red"}
                  ]
                }
              }
            },
            "options": {
              "orientation": "auto",
              "textMode": "value_and_name",
              "colorMode": "background",
              "graphMode": "area"
            }
          },
          {
            "id": 5,
            "title": "Node Resource Usage (Memory)",
            "type": "stat",
            "gridPos": {"h": 6, "w": 8, "x": 8, "y": 18},
            "targets": [
              {
                "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
                "legendFormat": "{{instance}}",
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "percent",
                "color": {"mode": "thresholds"},
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    {"value": 0, "color": "green"},
                    {"value": 70, "color": "yellow"},
                    {"value": 85, "color": "red"}
                  ]
                }
              }
            },
            "options": {
              "orientation": "auto",
              "textMode": "value_and_name",
              "colorMode": "background",
              "graphMode": "area"
            }
          },
          {
            "id": 6,
            "title": "Total Pods per Node",
            "type": "stat",
            "gridPos": {"h": 6, "w": 8, "x": 16, "y": 18},
            "targets": [
              {
                "expr": "count by (instance) (container_cpu_usage_seconds_total{container!=\"POD\", container!=\"\", namespace!=\"kube-system\"})",
                "legendFormat": "{{instance}}",
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "short",
                "color": {"mode": "palette-classic"}
              }
            },
            "options": {
              "orientation": "auto",
              "textMode": "value_and_name"
            }
          },
          {
            "id": 7,
            "title": "Pod Resource Usage - CPU & Memory (per Node)",
            "type": "table",
            "gridPos": {"h": 14, "w": 24, "x": 0, "y": 24},
            "targets": [
              {
                "expr": "sum by (instance, namespace, pod) (rate(container_cpu_usage_seconds_total{container!=\"POD\", container!=\"\", namespace!=\"kube-system\"}[5m])) * 1000",
                "format": "table",
                "instant": true,
                "refId": "A"
              },
              {
                "expr": "sum by (instance, namespace, pod) (container_memory_usage_bytes{container!=\"POD\", container!=\"\", namespace!=\"kube-system\"}) / 1024 / 1024",
                "format": "table",
                "instant": true,
                "refId": "B"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "custom": {
                  "displayMode": "color-background"
                }
              },
              "overrides": []
            },
            "options": {
              "showHeader": true,
              "sortBy": []
            }
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "timepicker": {
          "refresh_intervals": ["10s", "30s", "1m", "5m", "15m", "30m", "1h", "2h", "1d"]
        }
      }
    }

---
# ============================================================
# Grafana Secret (Admin Password)
# ============================================================
# NOTE: This secret is created by bootstrap.sh from GRAFANA_PASSWORD environment variable
# The secret is created dynamically, so this static definition is kept for reference only
# Actual secret is created via: kubectl create secret generic grafana-admin ...
# If you need to update the password, change GRAFANA_PASSWORD in QUICK_START/.env and run bootstrap.sh
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: finans-asistan
type: Opaque
stringData:
  admin-user: admin
  admin-password: "CHANGE_ME_IN_PRODUCTION"  # This will be overridden by bootstrap.sh from GRAFANA_PASSWORD

---
# ============================================================
# Grafana PersistentVolumeClaim
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: finans-asistan
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: hostpath

---
# ============================================================
# Grafana Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: finans-asistan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      # Distributed service - HPA scales horizontally across all nodes
      # Each node should have at least 1 pod, but can have more based on load
      # No affinity constraints - pods can be scheduled anywhere based on resources
      containers:
      - name: grafana
        image: grafana/grafana:10.2.0
        env:
        - name: IMAGE_DIGEST
          value: "latest"
        - name: GF_SECURITY_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: grafana-admin
              key: admin-user
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-admin
              key: admin-password
        - name: GF_SERVER_ROOT_URL
          value: "%(protocol)s://%(domain)s:%(http_port)s/"
        - name: GF_INSTALL_PLUGINS
          value: "grafana-piechart-panel"
        ports:
        - containerPort: 3000
          name: http
        volumeMounts:
        - name: grafana-data
          mountPath: /var/lib/grafana
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: grafana-dashboard-provisioning
          mountPath: /etc/grafana/provisioning/dashboards
        - name: grafana-dashboards
          mountPath: /etc/grafana/dashboards
        resources:
          requests:
            memory: "128Mi"  # Minimum request - start small, scale with HPA
            cpu: "50m"       # Minimum request - start small, scale with HPA
          limits:
            memory: "1Gi"    # R6G Large: 16GB RAM, ~14.4GB usable, Grafana gets 1GB
            cpu: "500m"      # Limit = request * 10 (50m * 10)
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: grafana-data
        persistentVolumeClaim:
          claimName: grafana-data
      - name: grafana-datasources
        configMap:
          name: grafana-datasources
      - name: grafana-dashboard-provisioning
        configMap:
          name: grafana-dashboard-provisioning
      - name: grafana-dashboards
        configMap:
          name: grafana-dashboard-cluster-overview

---
# ============================================================
# Grafana Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: finans-asistan
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    name: http

---
# ============================================================
# Node Exporter DaemonSet
# ============================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: finans-asistan
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      hostNetwork: true
      hostPID: true
      containers:
      - name: node-exporter
        image: prom/node-exporter:v1.7.0
        env:
        - name: IMAGE_DIGEST
          value: "latest"
        args:
          - '--path.procfs=/host/proc'
          - '--path.sysfs=/host/sys'
          - '--path.rootfs=/rootfs'
          - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
        ports:
        - containerPort: 9100
          name: metrics
        volumeMounts:
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: sys
          mountPath: /host/sys
          readOnly: true
        - name: rootfs
          mountPath: /rootfs
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"  # R6G Large: 16GB RAM, ~14.4GB usable, Node Exporter gets 512MB
            cpu: "500m"      # Limit = request * 10 (50m * 10)
      volumes:
      - name: proc
        hostPath:
          path: /proc
      - name: sys
        hostPath:
          path: /sys
      - name: rootfs
        hostPath:
          path: /

---
# ============================================================
# Node Exporter Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: finans-asistan
spec:
  type: ClusterIP
  selector:
    app: node-exporter
  ports:
  - port: 9100
    targetPort: 9100
    name: metrics

---
# ============================================================
# PostgreSQL Exporter Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: finans-asistan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      # Distributed service - HPA scales horizontally across all nodes
      # Each node should have at least 1 pod, but can have more based on load
      # No affinity constraints - pods can be scheduled anywhere based on resources
      # ServiceAccount for init container to use kubectl
      serviceAccountName: init-container
      # Init container: Wait for PostgreSQL to be ready
      initContainers:
      - name: wait-for-postgres
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for PostgreSQL to be ready..."
          max_wait=600  # 10 minutes max
          elapsed=0
          check_interval=5
          
          while [ $elapsed -lt $max_wait ]; do
            # Check PostgreSQL StatefulSet
            pg_ready=$(kubectl get statefulset postgres -n finans-asistan -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            pg_desired=$(kubectl get statefulset postgres -n finans-asistan -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "1")
            
            if [ "$pg_ready" = "$pg_desired" ] && [ -n "$pg_ready" ] && [ "$pg_ready" != "0" ]; then
              echo "PostgreSQL is ready!"
              exit 0
            fi
            
            echo "PostgreSQL not ready yet (${elapsed}s elapsed): ${pg_ready}/${pg_desired}"
            sleep $check_interval
            elapsed=$((elapsed + check_interval))
          done
          
          echo "Timeout waiting for PostgreSQL to be ready"
          exit 1
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      containers:
      - name: postgres-exporter
        image: prometheuscommunity/postgres-exporter:v0.15.0
        env:
        - name: IMAGE_DIGEST
          value: "latest"
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_PASSWORD
        - name: DATA_SOURCE_NAME
          value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)?sslmode=disable"
        ports:
        - containerPort: 9187
          name: metrics
        resources:
          requests:
            memory: "64Mi"   # Minimum request - start small, scale with HPA
            cpu: "50m"       # Minimum request - start small, scale with HPA
          limits:
            memory: "256Mi"  # R6G Large: 16GB RAM, ~14.4GB usable, PostgreSQL Exporter gets 256MB
            cpu: "500m"      # Limit = request * 10 (50m * 10)
        livenessProbe:
          httpGet:
            path: /metrics
            port: 9187
          initialDelaySeconds: 30
          periodSeconds: 10

---
# ============================================================
# PostgreSQL Exporter Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: finans-asistan
spec:
  type: ClusterIP
  selector:
    app: postgres-exporter
  ports:
  - port: 9187
    targetPort: 9187
    name: metrics

