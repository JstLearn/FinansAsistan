# ============================================================
# Kafka Exporter Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: finans-asistan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
    spec:
      # Kafka exporter is a metrics exporter, not a distributed service
      # It should run as a single pod (no HPA needed)
      # ServiceAccount for init container to use kubectl
      serviceAccountName: init-container
      # Init container: Wait for Kafka cluster to be ready before starting exporter
      initContainers:
      - name: wait-for-kafka
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for Kafka cluster to be ready..."
          max_wait=600  # 10 minutes max
          elapsed=0
          check_interval=5
          
          while [ $elapsed -lt $max_wait ]; do
            # Check if Kafka cluster is ready
            kafka_status=$(kubectl get kafka kafka-cluster -n finans-asistan -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "")
            
            if [ "$kafka_status" = "True" ]; then
              echo "Kafka cluster is ready!"
              exit 0
            fi
            
            echo "Kafka not ready yet (${elapsed}s elapsed), waiting..."
            sleep $check_interval
            elapsed=$((elapsed + check_interval))
          done
          
          echo "Timeout waiting for Kafka cluster to be ready"
          exit 1
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      containers:
      - name: kafka-exporter
        image: danielqsj/kafka-exporter:v1.7.0
        env:
        - name: IMAGE_DIGEST
          value: "latest"
        args:
          - '--kafka.server=kafka-cluster-kafka-bootstrap:9092'
        ports:
        - containerPort: 9308
          name: metrics
        resources:
          requests:
            memory: "64Mi"   # Minimum request - start small, scale with HPA
            cpu: "50m"       # Minimum request - start small, scale with HPA
          limits:
            memory: "256Mi"  # R6G Large: 16GB RAM, ~14.4GB usable, Kafka Exporter gets 256MB
            cpu: "500m"      # Limit = request * 10 (50m * 10)
        startupProbe:
          httpGet:
            path: /metrics
            port: 9308
          initialDelaySeconds: 10  # Reduced since init container waits for Kafka
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12  # Allow up to 2 minutes for exporter startup (10s + 12*10s = 130s)
        livenessProbe:
          httpGet:
            path: /metrics
            port: 9308
          initialDelaySeconds: 10  # Reduced since startup probe handles initial delay
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /metrics
            port: 9308
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3

---
# ============================================================
# Kafka Exporter Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: finans-asistan
spec:
  type: ClusterIP
  selector:
    app: kafka-exporter
  ports:
  - port: 9308
    targetPort: 9308
    name: metrics

